<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gone Fishin'</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <!-- LOADING SCREEN -->
    <div id="loadingScreen">
        <div class="cloud cloud1" style="top: 10%; animation-duration: 40s;"></div>
        <div class="cloud cloud2" style="top: 25%; left: 20%; animation-duration: 30s;"></div>
        <div class="cloud cloud1" style="top: 65%; left: 50%; animation-duration: 35s; transform: scale(0.8);"></div>
        <div class="cloud cloud2" style="top: 80%; left: 10%; animation-duration: 25s; transform: scale(1.2);"></div>
        
        <h1 class="loading-title">Gone Fishin'</h1>
        
        <div class="loading-ui-wrapper">
            <div class="loading-bar-container">
                <div class="loading-bar" id="loadingBar"></div>
            </div>
            <div class="start-prompt">Connecting to server...</div>
        </div>
    </div>

    <!-- MAIN GAME LAYOUT -->
    <div class="sky-area">
        <div class="sun"></div>
        <div class="cloud cloud1"></div>
        <div class="cloud cloud2"></div>
        
        <div class="horizon-elements">
            <div class="tree bg" style="left: -2%; transform: scale(0.6);"><div class="tree-trunk"></div><div class="tree-layer bot"></div><div class="tree-layer mid"></div><div class="tree-layer top"></div></div>
            <div class="tree bg" style="left: 10%; transform: scale(0.5);"><div class="tree-trunk"></div><div class="tree-layer bot"></div><div class="tree-layer mid"></div><div class="tree-layer top"></div></div>
            <div class="tree bg" style="left: 24%; transform: scale(0.65);"><div class="tree-trunk"></div><div class="tree-layer bot"></div><div class="tree-layer mid"></div><div class="tree-layer top"></div></div>
            <div class="tree bg" style="right: 28%; transform: scale(0.5);"><div class="tree-trunk"></div><div class="tree-layer bot"></div><div class="tree-layer mid"></div><div class="tree-layer top"></div></div>
            <div class="tree bg" style="right: 4%; transform: scale(0.65);"><div class="tree-trunk"></div><div class="tree-layer bot"></div><div class="tree-layer mid"></div><div class="tree-layer top"></div></div>

            <div class="cabin-container">
                <div class="smoke smoke1"></div><div class="smoke smoke2"></div>
                <div class="cabin-body">
                    <div class="chimney"></div><div class="cabin-roof"></div><div class="cabin-window left"></div><div class="cabin-window right"></div><div class="cabin-door"></div><div class="cabin-porch"></div><div class="cabin-pillar left"></div><div class="cabin-pillar right"></div>
                </div>
            </div>

            <div class="tree bg" style="right: 17%; bottom: 10px; transform: scale(0.55); z-index: 4;"><div class="tree-trunk"></div><div class="tree-layer bot"></div><div class="tree-layer mid"></div><div class="tree-layer top"></div></div>
            <div class="tree fg" style="right: 15%; bottom: -5px; transform: scale(0.9); z-index: 4;"><div class="tree-trunk"></div><div class="tree-layer bot"></div><div class="tree-layer mid"></div><div class="tree-layer top"></div></div>
            <div class="tree fg" style="right: 21%; bottom: 0; transform: scale(0.75); z-index: 4;"><div class="tree-trunk"></div><div class="tree-layer bot"></div><div class="tree-layer mid"></div><div class="tree-layer top"></div></div>

            <div class="tree fg" style="left: -1%; transform: scale(1.15);"><div class="tree-trunk"></div><div class="tree-layer bot"></div><div class="tree-layer mid"></div><div class="tree-layer top"></div></div>
            <div class="tree fg" style="left: 14%; transform: scale(1.05);"><div class="tree-trunk"></div><div class="tree-layer bot"></div><div class="tree-layer mid"></div><div class="tree-layer top"></div></div>
            <div class="tree fg" style="left: 30%; transform: scale(1.2);"><div class="tree-trunk"></div><div class="tree-layer bot"></div><div class="tree-layer mid"></div><div class="tree-layer top"></div></div>
            <div class="tree fg" style="right: 6%; transform: scale(0.95);"><div class="tree-trunk"></div><div class="tree-layer bot"></div><div class="tree-layer mid"></div><div class="tree-layer top"></div></div>
            <div class="tree fg" style="right: -4%; transform: scale(1.25);"><div class="tree-trunk"></div><div class="tree-layer bot"></div><div class="tree-layer mid"></div><div class="tree-layer top"></div></div>
        </div>
    </div>

    <!-- UI ALERTS AND BUTTONS -->
    <div class="game-ui-left">
        <div class="coin-sign">🪙 <span id="coinCount">0</span></div>
        <button class="action-btn sell-btn" id="sellBtn">💰 Sell Catch</button>
        <button class="action-btn music-btn" id="musicBtn">🔈 Lofi Off</button>
    </div>
    <div class="game-ui-right">
        <button class="shop-icon-btn" id="openShopBtn">🛒 Shop</button>
    </div>
    
    <div id="statusMessage"></div>

    <div class="ground-area" id="groundArea">
        <div class="pond-container" id="pond">
            <div class="lilypad" style="width: 35px; height: 35px; top: 15%; left: 15%; transform: rotate(15deg);"></div>
            <div class="lilypad flower" style="width: 25px; height: 25px; top: 35%; left: 25%; transform: rotate(-30deg);">
